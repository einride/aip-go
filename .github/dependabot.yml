version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

    cooldown:
      default-days: 7
  - package-ecosystem: gomod
    directories: [".", ".sage"]
    schedule:
      interval: monthly
    groups:
      go-dependencies:
        patterns: ["*"]
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
